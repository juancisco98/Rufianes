<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <link rel="icon" type="image/png" href="/logo-rufianes.png" />
  <link rel="apple-touch-icon" href="/logo-rufianes.png" />
  <meta name="theme-color" content="#f59e0b" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rufianes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Sistema de gestión para barberías Rufianes" />
  <title>Rufianes Barbershop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { bg: '#0f172a', card: '#1e293b' },
            // ── iOS-style design tokens ────────────────────────────────
            ios: {
              bg:       '#F2F2F7',
              bg2:      '#FFFFFF',
              grouped:  '#EFEFF4',
              surface:  'rgba(255,255,255,0.72)',
              border:   'rgba(60,60,67,0.16)',
              divider:  'rgba(60,60,67,0.10)',
              label:    '#1C1C1E',
              label2:   'rgba(60,60,67,0.6)',
              label3:   'rgba(60,60,67,0.3)',
              accent:   '#FFB300',   // Rufianes amber
              red:      '#FF3B30',
              green:    '#34C759',
              blue:     '#0A84FF',
              violet:   '#AF52DE',
              orange:   '#FF9500',
            },
            iosDark: {
              bg:       '#000000',
              bg2:      '#1C1C1E',
              grouped:  '#2C2C2E',
              surface:  'rgba(28,28,30,0.72)',
              border:   'rgba(84,84,88,0.36)',
              divider:  'rgba(84,84,88,0.20)',
              label:    '#FFFFFF',
              label2:   'rgba(235,235,245,0.6)',
              label3:   'rgba(235,235,245,0.3)',
            }
          },
          boxShadow: {
            'ios-sm':      '0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.06)',
            'ios':         '0 4px 16px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06)',
            'ios-lg':      '0 12px 40px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.08)',
            'ios-xl':      '0 24px 60px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(0,0,0,0.08)',
            'ios-pressed': 'inset 0 2px 6px rgba(0,0,0,0.10)',
            'ios-glow':    '0 0 0 4px rgba(255,179,0,0.18)',
          },
          backdropBlur: {
            ios:   '20px',
            iosLg: '40px',
          },
          fontFamily: {
            display: ['"Bebas Neue"', 'Inter', 'sans-serif'],
          },
          keyframes: {
            'ios-pop': {
              '0%':   { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)',    opacity: '1' },
            },
            'ios-slide-up': {
              '0%':   { transform: 'translateY(100%)' },
              '100%': { transform: 'translateY(0)' },
            },
            'ios-fade-in': {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'shimmer': {
              '0%':   { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            }
          },
          animation: {
            'ios-pop':      'ios-pop 180ms cubic-bezier(0.16, 1, 0.3, 1)',
            'ios-slide-up': 'ios-slide-up 280ms cubic-bezier(0.16, 1, 0.3, 1)',
            'ios-fade-in':  'ios-fade-in 200ms ease-out',
            'shimmer':      'shimmer 1.6s linear infinite',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background-color: #F2F2F7;
      overflow: hidden;
      transition: background-color 0.5s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
    }

    .dark body {
      background-color: #000000;
    }

    /* Safe area utilities */
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pl-safe { padding-left: env(safe-area-inset-left); }
    .pr-safe { padding-right: env(safe-area-inset-right); }
    .h-safe-top { height: env(safe-area-inset-top); }
    .h-safe-bottom { height: env(safe-area-inset-bottom); }

    /* Skeleton shimmer */
    .ios-skeleton {
      background: linear-gradient(90deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.10) 50%, rgba(0,0,0,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }
    .dark .ios-skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
    }

    /* Tap highlight off — feels more native */
    * { -webkit-tap-highlight-color: transparent; }

    /* Custom Scrollbar for sleek look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-track { background: #1e293b; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 100px; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Leaflet overrides */
    .leaflet-container {
      width: 100%;
      height: 100%;
      background: #e5e7eb;
      z-index: 0;
    }

    /* Hide attribution for cleaner UI in this demo (not recommended for prod) */
    .leaflet-control-attribution {
      display: none;
    }

    /* Hide zoom controls on mobile — touch gestures are enough */
    @media (max-width: 768px) {
      .leaflet-control-zoom {
        display: none !important;
      }
    }

    /* Bigger, more visible zoom controls (desktop only) */
    .leaflet-control-zoom a {
      width: 40px !important;
      height: 40px !important;
      line-height: 40px !important;
      font-size: 20px !important;
      font-weight: bold !important;
      border-radius: 12px !important;
      background: white !important;
      color: #1f2937 !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
      border: none !important;
    }

    .leaflet-control-zoom a:hover {
      background: #f3f4f6 !important;
    }

    .leaflet-control-zoom {
      border: none !important;
      border-radius: 14px !important;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12) !important;
    }
  </style>


</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
